<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRUNKSHIRTS®</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <section class="hero">
    <div class="logo">DRUNKSHIRTS®</div>
    <p class="tagline">Wear Your Drink</p>
    <p class="scroll">Scroll to explore</p>
  </section>

  <section class="section">
    <h1>Drinks are culture. Shirts are uniform.</h1>
  </section>

  <section class="section drops">
    <h2>THE DROPS</h2>
    <ul>
      <li>Drop 01 — Spritz Club</li>
      <li>Drop 02 — Big Bueno</li>
      <li>Drop 03 — Coming Soon</li>
    </ul>
  </section>

  <section class="section enter">
    <button onclick="enterShop()">ENTER THE SHOP</button>
  </section>

  <section id="shop" class="shop hidden">
    <h2>SHOP</h2>

    <div class="grid">
      <div class="card">
        <h3>Big Bueno Tee</h3>
        <p>Limited Drop</p>
      </div>

      <div class="card">
        <h3>Spritz Club Tee</h3>
        <p>Limited Drop</p>
      </div>
    </div>
  </section>

</body>
<script src="script.js"></script>
</html>
